name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Prepare deployment directory
        run: |
          mkdir deploy
          cp -r dist deploy/dist
          cp -r polyfills deploy/polyfills
          cp -r examples deploy/examples
          mkdir -p deploy/node_modules/@mlc-ai/web-llm
          cp -r node_modules/@mlc-ai/web-llm/lib deploy/node_modules/@mlc-ai/web-llm/lib
          # Copy basic-demo.html as index.html so it serves as the homepage
          cp examples/basic-demo.html deploy/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
